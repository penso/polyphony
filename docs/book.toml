[book]
description = "Project documentation for the polyphony Rust workspace"
language    = "en"
src         = "src"
title       = "polyphony"

[build]
build-dir = "book"

[output.html]
additional-js        = ["mermaid-init.js", "mermaid.min.js"]
default-theme        = "rust"
preferred-dark-theme = "navy"

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
