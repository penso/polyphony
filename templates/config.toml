# Polyphony user config.
# Destination: copy to ~/.config/polyphony/config.toml.
# This file is created automatically on first start.
# Merge order is: built-in defaults, this file, WORKFLOW.md front matter,
# .polyphony/config.toml, then POLYPHONY__... env vars.
# Use "$ENV_VAR" to resolve secrets from the environment instead of writing them directly.
# Keep reusable credentials and agent profiles here.
# Keep shared tracker credentials in `[trackers.profiles.<name>]`.
# Keep local repository/project selection and git-backed workspace settings in `.polyphony/config.toml`
# when you do not want to edit the checked-in workflow.

[tracker]
# Keep the active tracker selection in repo-local config. This section is for generic defaults.
kind = "none"
endpoint = "https://api.linear.app/graphql"
active_states = ["Todo", "In Progress"]
terminal_states = ["Closed", "Cancelled", "Canceled", "Duplicate", "Done", "Human Review"]

# Shared tracker credential profiles. Select one with `tracker.profile = "profile_name"`
# in `.polyphony/config.toml` or `WORKFLOW.md`.
[trackers.profiles]

# GitHub example.
# [trackers.profiles.github_personal]
# kind = "github"
# api_key = "$GITHUB_TOKEN"

# Linear example.
# [trackers.profiles.linear_work]
# kind = "linear"
# endpoint = "https://api.linear.app/graphql"
# api_key = "$LINEAR_API_KEY"

[polling]
interval_ms = 30000

[workspace]
root = ".polyphony/workspaces"
checkout_kind = "directory"
sync_on_reuse = true
transient_paths = ["tmp", ".elixir_ls"]

[hooks]
timeout_ms = 60000
# after_create = "just bootstrap"
# before_run = "just test"
# after_run = "just lint"
# before_remove = "rm -rf node_modules/.cache"

[agent]
max_concurrent_agents = 10
max_retry_backoff_ms = 300000
max_turns = 20
# continuation_prompt = '''
# Continue {{ issue.identifier }} turn {{ turn_number }} of {{ max_turns }}.
# '''

[agent.max_concurrent_agents_by_state]
# todo = 2
# "in progress" = 4

[agents]
# default = "codex"

[agents.by_state]
# todo = "claude"

[agents.by_label]
# risky = "claude"

# Leave [agents.profiles] empty for tracker-only mode. Polyphony will still poll and display issues.
[agents.profiles]

