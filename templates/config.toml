# approval_policy = "auto"
# thread_sandbox = "workspace-write"
# turn_sandbox_policy = "workspace-write"
# turn_timeout_ms = 3600000
# read_timeout_ms = 5000
# stall_timeout_ms = 300000
# credits_command = "custom-agent credits --json"
# spending_command = "custom-agent spending --json"
# use_tmux = false                # false uses Polyphony's managed PTY backend, true runs inside tmux for manual attach
# tmux_session_prefix = "example"
# interaction_mode = "one_shot"
# prompt_mode = "env"
# idle_timeout_ms = 5000
# completion_sentinel = "DONE"
# [agents.profiles.example.env]
# OPENAI_ORG = "org_123"

# Codex app-server example.
# [agents.profiles.codex]
# kind = "codex"
# transport = "app_server"
# command = "codex --dangerously-bypass-approvals-and-sandbox app-server"
# fetch_models = true
# models_command = "codex models --json"
