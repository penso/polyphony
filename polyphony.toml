# Polyphony repo-local config.
# Destination: polyphony.toml in the repository root.
# This file is created automatically when a repo already has a shared WORKFLOW.md and
# local tracker or workspace wiring is still unset.
# Merge order is: built-in defaults, ~/.config/polyphony/config.toml, WORKFLOW.md,
# this file, then POLYPHONY__... env vars.

[tracker]
kind = "beads"
active_states = ["Open", "In Progress", "Blocked"]
terminal_states = ["Closed", "Deferred"]
# Optional shared tracker profile from ~/.config/polyphony/config.toml:
# profile = "github_personal"
# GitHub example:
# kind = "github"
# repository = "owner/repo"
# Optional for public repository issue polling, but recommended.
# api_key = "$GITHUB_TOKEN"
#
# Linear example:
# kind = "linear"
# profile = "linear_work"
# project_slug = "ENG"
# api_key = "$LINEAR_API_KEY"

[workspace]
checkout_kind = "linked_worktree"
source_repo_path = "/Users/penso/code/polyphony"
sync_on_reuse = true
# default_branch = "main"

# ── Agent routing for this repo ─────────────────────────────────────────────
# Profiles (opus, codex, kimi) are defined in ~/.config/polyphony/config.toml.
# This section controls which agent handles which kind of issue.
[hooks]
after_create = "mise trust"

[agents]
default = "opus"

[agents.by_label]
research = "kimi"
investigation = "kimi"
testing = "codex"
validation = "codex"
review = "codex"
