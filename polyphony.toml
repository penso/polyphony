# Polyphony repo-local config.
# Destination: polyphony.toml in the repository root.
# This file is created automatically when a repo already has a shared WORKFLOW.md and
# local tracker or workspace wiring is still unset.
# Merge order is: built-in defaults, ~/.config/polyphony/config.toml, WORKFLOW.md,
# this file, then POLYPHONY__... env vars.

[tracker]
kind = "github"
repository = "penso/polyphony"
api_key = "$GITHUB_TOKEN"
active_states = ["open", "todo", "in progress"]
terminal_states = ["closed"]
# Optional shared tracker profile from ~/.config/polyphony/config.toml:
# profile = "github_personal"
# GitHub example:
# kind = "github"
# repository = "owner/repo"
# Optional for public repository issue polling, but recommended.
# api_key = "$GITHUB_TOKEN"
#
# Linear example:
# kind = "linear"
# profile = "linear_work"
# project_slug = "ENG"
# api_key = "$LINEAR_API_KEY"

[workspace]
checkout_kind = "discrete_clone"
source_repo_path = "/Users/penso/code/polyphony"
clone_url = "https://github.com/penso/polyphony.git"
sync_on_reuse = false
default_branch = "main"

# ── Agent routing for this repo ─────────────────────────────────────────────
# Profiles (opus, codex, kimi) are defined in ~/.config/polyphony/config.toml.
# This section controls which agent handles which kind of issue.
[hooks]
after_create = "mise trust"

[agent]
max_concurrent_agents = 6

[agents]
default = "implementer"
reviewer = "reviewer"

[agents.by_label]
research = "researcher"
investigation = "researcher"
testing = "tester"
validation = "tester"
review = "reviewer"

[orchestration]
router_agent = "router"
dispatch_mode = "manual"

[pipeline]
enabled = true
replan_on_failure = true
validation_agent = "reviewer"

[[pipeline.stages]]
category = "research"
agent = "researcher"

[[pipeline.stages]]
category = "coding"
agent = "implementer"

[[pipeline.stages]]
category = "testing"
agent = "tester"

[[pipeline.stages]]
category = "documentation"
agent = "implementer"

[[pipeline.stages]]
category = "review"
agent = "reviewer"

[automation]
enabled = true
draft_pull_requests = true
review_agent = "reviewer"
commit_message = "fix({{ issue.identifier }}): {{ issue.title }}"
pr_title = "{{ issue.identifier }}: {{ issue.title }}"
