mutation LinearUpdateIssue(
  $id: String!
  $title: String
  $description: String
  $stateId: String
  $priority: Int
  $labelIds: [String!]
) {
  issueUpdate(
    id: $id
    input: {
      title: $title
      description: $description
      stateId: $stateId
      priority: $priority
      labelIds: $labelIds
    }
  ) {
    success
    issue {
      id
      identifier
      title
      description
      priority
      branchName
      url
      createdAt
      updatedAt
      state {
        name
      }
      creator {
        id
        name
        displayName
        url
        guest
        admin
        owner
      }
      labels {
        nodes {
          name
        }
      }
    }
  }
}
