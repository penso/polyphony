<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Polyphony{% endblock %}</title>
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'system';
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="brand">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="11" cy="13" r="4" fill="#7c3aed"/>
        <circle cx="21" cy="13" r="4" fill="#a78bfa"/>
        <circle cx="16" cy="22" r="4" fill="#6366f1"/>
        <line x1="11" y1="13" x2="21" y2="13" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
        <line x1="11" y1="13" x2="16" y2="22" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
        <line x1="21" y1="13" x2="16" y2="22" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
      </svg>
      Polyphony
    </a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/inbox">Inbox</a>
      <a href="/runs">Runs</a>
      <a href="/agents">Agents</a>
      <a href="/outcomes">Outcomes</a>
      <a href="/tasks">Tasks</a>
      <a href="/logs">Logs</a>
      <a href="/graphql">GraphQL</a>
    </div>
    <span class="spacer"></span>
    <button id="theme-toggle" title="Theme: System">
      <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="theme-icon-system" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Polyphony &mdash; <time datetime="{{ generated_at }}">{{ generated_at }}</time></footer>

  <script>
    (function() {
      var themeCycle = ['light', 'system', 'dark'];
      var themeToggle = document.getElementById('theme-toggle');

      function applyTheme(mode) {
        if (mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }

      function updateThemeIcon(mode) {
        document.getElementById('theme-icon-light').classList.toggle('hidden', mode !== 'light');
        document.getElementById('theme-icon-system').classList.toggle('hidden', mode !== 'system');
        document.getElementById('theme-icon-dark').classList.toggle('hidden', mode !== 'dark');
        var titles = { light: 'Theme: Light', system: 'Theme: System', dark: 'Theme: Dark' };
        themeToggle.title = titles[mode] || 'Toggle theme';
      }

      var current = localStorage.getItem('theme') || 'system';
      applyTheme(current);
      updateThemeIcon(current);

      themeToggle.addEventListener('click', function() {
        var cur = localStorage.getItem('theme') || 'system';
        var idx = themeCycle.indexOf(cur);
        var next = themeCycle[(idx + 1) % themeCycle.length];
        localStorage.setItem('theme', next);
        applyTheme(next);
        updateThemeIcon(next);
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
        if ((localStorage.getItem('theme') || 'system') === 'system') applyTheme('system');
      });
    })();

    // Highlight active nav link
    (function() {
      var path = location.pathname;
      var links = document.querySelectorAll('.nav-links a');
      links.forEach(function(a) {
        var href = a.getAttribute('href');
        if (href === path || (href === '/' && path === '/')) {
          a.classList.add('active');
        }
      });
    })();

    // Local time formatting via Luxon
    (function() {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js';
      s.onload = function() {
        var DT = luxon.DateTime;
        var SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

        function hydrate() {
          var els = document.querySelectorAll('time[datetime]:not([data-h])');
          for (var el of els) {
            var dt = DT.fromISO(el.getAttribute('datetime'), { zone: 'utc' });
            if (!dt.isValid) continue;
            var now = DT.now();
            var diff = now.toMillis() - dt.toMillis();
            var local = dt.toLocal();
            if (diff >= 0 && diff < 30000) el.textContent = 'just now';
            else if (diff >= 0 && diff < SEVEN_DAYS) el.textContent = dt.toRelative();
            else el.textContent = local.toFormat('yyyy-MM-dd hh:mma').toLowerCase();
            el.title = local.toLocaleString(DT.DATETIME_FULL);
            el.setAttribute('data-h', '1');
          }
        }

        hydrate();
        new MutationObserver(hydrate).observe(document.body, { childList: true, subtree: true });
        setInterval(function() {
          for (var el of document.querySelectorAll('time[data-h]')) el.removeAttribute('data-h');
          hydrate();
        }, 60000);
      };
      document.head.appendChild(s);
    })();

    // Auto-refresh via WebSocket
    (function() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var ws = new WebSocket(proto + '//' + location.host + '/graphql/ws', 'graphql-ws');
      ws.onopen = function() {
        ws.send(JSON.stringify({ type: 'connection_init' }));
        ws.send(JSON.stringify({
          id: '1', type: 'subscribe',
          payload: { query: 'subscription { snapshotUpdated { generatedAt } }' }
        }));
      };
      ws.onmessage = function(evt) {
        var data = JSON.parse(evt.data);
        if (data.type === 'next') { location.reload(); }
      };
      ws.onerror = function() { setTimeout(function() { location.reload(); }, 30000); };
    })();
  </script>
</body>
</html>
