scalar Time

schema {
  query: Query
  mutation: Mutation
}

type Query {
  project(fullPath: ID!): Project
  currentUser: UserCore
}

type Mutation {
  createNote(input: CreateNoteInput!): CreateNotePayload
}

input CreateNoteInput {
  noteableId: ID!
  body: String!
}

type CreateNotePayload {
  note: Note
  errors: [String!]
}

type Project {
  issues(
    state: IssuableSearchableField
    first: Int
    after: String
  ): IssueConnection
  issue(iid: String!): Issue
  mergeRequest(iid: String!): MergeRequest
  mergeRequests(
    state: MergeRequestState
    first: Int
    after: String
  ): MergeRequestConnection
}

enum IssuableSearchableField {
  opened
  closed
}

enum MergeRequestState {
  opened
  closed
  merged
  all
}

type IssueConnection {
  nodes: [Issue!]
  pageInfo: PageInfo!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

type Issue {
  id: ID!
  iid: String!
  title: String!
  description: String
  state: IssueState!
  webUrl: String!
  createdAt: Time!
  updatedAt: Time!
  author: UserCore
  labels: LabelConnection
  notes(first: Int, after: String): NoteConnection
}

enum IssueState {
  opened
  closed
}

type NoteConnection {
  nodes: [Note!]
  pageInfo: PageInfo!
}

type Note {
  id: ID!
  body: String!
  system: Boolean!
  author: UserCore!
  createdAt: Time!
  updatedAt: Time!
}

type UserCore {
  username: String!
  name: String!
  webUrl: String!
  bot: Boolean!
}

type LabelConnection {
  nodes: [Label!]
}

type Label {
  title: String!
}

type MergeRequestConnection {
  nodes: [MergeRequest!]
  pageInfo: PageInfo!
}

type MergeRequest {
  iid: String!
  title: String!
  description: String
  state: String!
  webUrl: String!
  sourceBranch: String!
  targetBranch: String!
  diffHeadSha: String
  draft: Boolean!
  mergeableDiscussionsState: Boolean
  author: UserCore
  labels: LabelConnection
  createdAt: Time!
  updatedAt: Time!
  notes(first: Int, after: String): NoteConnection
}
