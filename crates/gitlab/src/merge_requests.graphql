query FetchOpenMergeRequests($fullPath: ID!, $after: String) {
  project(fullPath: $fullPath) {
    mergeRequests(state: opened, first: 100, after: $after) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        iid
        title
        description
        state
        webUrl
        sourceBranch
        targetBranch
        diffHeadSha
        draft
        author {
          username
          name
          webUrl
          bot
        }
        labels {
          nodes {
            title
          }
        }
        createdAt
        updatedAt
      }
    }
  }
}

query FetchMergeRequestByIid($fullPath: ID!, $iid: String!) {
  project(fullPath: $fullPath) {
    mergeRequest(iid: $iid) {
      iid
      title
      state
      webUrl
      sourceBranch
      targetBranch
      diffHeadSha
      draft
      createdAt
      updatedAt
      notes(first: 100) {
        nodes {
          id
          body
          system
          author {
            username
            name
            webUrl
            bot
          }
          createdAt
          updatedAt
        }
      }
    }
  }
}

mutation CreateMergeRequestNote($noteableId: ID!, $body: String!) {
  createNote(input: { noteableId: $noteableId, body: $body }) {
    note {
      id
      body
      system
      author {
        username
        name
        webUrl
        bot
      }
      createdAt
      updatedAt
    }
    errors
  }
}
